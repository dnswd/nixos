<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Test Page</title>
</head>
<body>
  <h1>Form Elements</h1>
  <form id="test-form">
    <label for="text-input">Text Input</label>
    <input type="text" id="text-input" name="text" placeholder="Enter text">

    <label for="email-input">Email</label>
    <input type="email" id="email-input" name="email" placeholder="Enter email">

    <label for="password-input">Password</label>
    <input type="password" id="password-input" name="password">

    <label for="select-menu">Select</label>
    <select id="select-menu" name="option">
      <option value="">Choose...</option>
      <option value="a">Option A</option>
      <option value="b">Option B</option>
    </select>

    <label>
      <input type="checkbox" id="check-box" name="agree">
      I agree
    </label>

    <button type="submit">Submit</button>
  </form>
</body>
</html>

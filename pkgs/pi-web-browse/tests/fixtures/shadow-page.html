<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadow DOM Test Page</title>
</head>
<body>
  <h1>Shadow DOM Test</h1>
  <div id="host"></div>
  <script>
    const host = document.getElementById('host');
    const shadow = host.attachShadow({ mode: 'open' });
    shadow.innerHTML = `
      <p>Content inside shadow DOM</p>
      <button>Shadow Button</button>
    `;
  </script>
</body>
</html>

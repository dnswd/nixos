<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Network Test Page</title>
</head>
<body>
  <h1>Network Monitoring Test</h1>
  <p>This page makes various network requests.</p>
  <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==" alt="test image">
  <button id="trigger-xhr">Load Data</button>
  <div id="result"></div>
  <script>
    document.getElementById('trigger-xhr').addEventListener('click', async () => {
      try {
        const response = await fetch('/api/data');
        const data = await response.json();
        document.getElementById('result').textContent = JSON.stringify(data);
      } catch (e) {
        console.error('Fetch failed:', e);
      }
    });
  </script>
</body>
</html>
